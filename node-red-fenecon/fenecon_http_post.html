<script type="text/javascript">
    RED.nodes.registerType('feneconHttpPost',{
        category: 'input',
        color: '#0fcdf8',
        defaults: {
            name: {value:""},
            fems:{value:"",type:"feneconFems",required:true},
            topic:{value:""}
        },
        inputs:1,
        outputs:0,
        icon: "solar.png",
        label: function() {
            return this.name||this.topic||"Fenecon post";
        },
        labelStyle: function() {
            return this.name?"node_label_italic":"";
        },
        paletteLabel: "Fenecon post",
        inputLabels: 'data'
    });
</script>

<script type="text/x-red" data-template-name="feneconHttpPost">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-fems"><i class="fa fa-server"></i> FEMS</label>
        <input type="text" id="node-input-fems">
    </div>
    <div class="form-row">
        <label for="node-input-topic"><i class="fa fa-envelope-o"></i> Topic</label>
        <input type="text" id="node-input-topic" placeholder="Topic">
    </div>
</script>

<script type="text/x-red" data-help-name="feneconHttpPost">

    <p>A Node Red node to set data points at a Fenecon FEMS with the App "Schreibzugriff".</p>
    
    <h3>Input</h3>
    <dl class="message-properties">
        <dt>topic <span class="property-type">string</span></dt>
        <dd> data point to be written</dd>
        <dt>payload <span class="property-type">number</span></dt>
        <dd> value to be written</dd>
    </dl>
    
    <h4>Data Points</h4>
    
    <p>The data points of the FEMS are always named as <code>group/name</code>.
    You can find the writable data points at the <a href="https://docs.fenecon.de/de/fems/fems-app/App_REST-JSON_Schreibzugriff.html">FEMS documentation</a>.</p>

    <p>Examples:
    <ul>
      <li><code>ess0/SetActivePowerEquals</code>
      <li><code>ess0/SetActivePowerLessOrEquals</code>
      <li><code>ess0/SetActivePowerGreaterOrEquals</code>
    </ul></p>

    <h3>Parameters</h3>
    <dl class="message-properties">
        <dt>fems <span class="property-type">feneconFems</span></dt>
        <dd> configuration of the FEMS.</dd>
        <dt>Topic <span class="property-type">string</span></dt>
        <dd> the data point to set; if empty, <code>msg.topic</code> will be used.</dd>
    </dl>

</script>
