<script type="text/javascript">
    RED.nodes.registerType('feneconHttpGet',{
        category: 'input',
        color: '#0fcdf8',
        defaults: {
            name: {value:""},
            fems:{value:"",type:"feneconFems",required:true}
        },
        inputs:1,
        outputs:1,
        icon: "solar.png",
        label: function() {
            return this.name||"Fenecon get";
        },
        labelStyle: function() {
            return this.name?"node_label_italic":"";
        },
        paletteLabel: "Fenecon get",
        inputLabels: 'request',
        outputLabels: 'data'
    });
</script>

<script type="text/x-red" data-template-name="feneconHttpGet">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-fems"><i class="fa fa-server"></i> FEMS</label>
        <input type="text" id="node-input-fems">
    </div>
</script>

<script type="text/x-red" data-help-name="feneconHttpGet">

    <p>A Node Red node to request one ore more data points from a Fenecon FEMS.</p>
    
    <h3>Input</h3>
    <dl class="message-properties">
        <dt>topic <span class="property-type">string</span></dt>
        <dd> data point to be requested</dd>
    </dl>

    <h4>Data Points</h4>
    The data points of the FEMS are always named as <code>group/name</code>.
    You can get all possible data points with the request <code>.*/.*</code>.

    Examples:
    <ul>
      <li><code>.*/.*</code>
      <li><code>_meta/V.*</code>
      <li><code>_meta/Version</code>
      <li><code>ctrlGridOptimizedCharge0/(DelayChargeMaximumChargeLimit|_PropertyManualTargetTime)</code>
    </ul>
    
    <h3>Outputs</h3>
    <dl class="message-properties">
        <dt>topic <span class="property-type">string</span></dt>
        <dd> same as in input</dd>
        <dt>payload <span class="property-type">value or object</span></dt>
        <dd> received data points. If more than one data point is returned, it is an object with key/value pairs.</dd>
    </dl>
    
    <h3>Parameters</h3>
    <dl class="message-properties">
        <dt>fems <span class="property-type">feneconFems</span></dt>
        <dd> configuration of the FEMS.</dd>
    </dl>
    
</script>
