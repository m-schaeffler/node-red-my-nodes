7<script type="text/javascript">
    RED.nodes.registerType('formatNumber',{
        category: "Dashboard 2",
        color: "#C7E9C0",
        defaults: {
            name:{value:""},
            property:{value:"payload",required:true},
            propertyType:{value:"msg"},
            unit:{value:""},
            grouping:{value:"'"},
            decimal:{value:",",required:true},
            digits:{value:0,validate:RED.validators.number(),required:true},
            colors:{value:"[]",required:true},
            showState:{value:false},
            filter:{value:false}
        },
        inputs:1,
        outputs:1,
        icon: "font-awesome/fa-quote-right",
        label: function() {
            return this.name||"formNumber";
        },
        labelStyle: function() {
            return this.name?"node_label_italic":"";
        },
        paletteLabel: "formNumber",
        inputLabels: 'input',
        outputLabels: 'formated number',
        oneditprepare: function() {
            $("#node-input-property").typedInput({
                type:"msg",
                types:["msg","jsonata"],
                typeField: "#node-input-propertyType"
            })
            $("#node-input-digits").on("change",function() {
                if (this.value === "0") {
                    $("#decimal-details").hide();
                } else {
                    $("#decimal-details").show();
                }
            }).trigger("change");
            // Colors
            const colorsList = $("#node-input-colors-container").css('min-height','150px').css('min-width','450px').editableList({
                addItem: function(container,i,device) {
                    container.css({
                        overflow: 'hidden',
                        whiteSpace: 'nowrap'
                    });
                    const row = $('<div/>').appendTo(container);
                    var properyOperator = $('<select/>',{class:"node-input-color-operator",style:"width:43px; margin-right:10px;"}).appendTo(row);
                    properyOperator.append($("<option></option>").val("<").text("<"));
                    properyOperator.append($("<option></option>").val("<=").text("<="));
                    properyOperator.append($("<option></option>").val(">=").text(">="));
                    properyOperator.append($("<option></option>").val(">").text(">"));
                    const propertyValue = $('<input/>',{class:"node-input-color-value",type:"text"})
                        .css("width","35%")
                        .appendTo(row)
                        .typedInput({types:['num']});
                    $('<div/>',{style: 'display:inline-block; padding:0px 6px;'})
                        .text('=')
                        .appendTo(row);
                    var propertyColor = $('<select/>',{class:"node-input-color-color",style:"width:45%;"}).appendTo(row);
                    propertyColor.append($("<option></option>").val("redValue").text("red"));
                    propertyColor.append($("<option></option>").val("greenValue").text("green"));
                    propertyColor.append($("<option></option>").val("darkgreenValue").text("darkgreen"));
                    propertyColor.append($("<option></option>").val("yellowValue").text("yellow"));
                    propertyColor.append($("<option></option>").val("blueValue").text("blue"));
                    propertyColor.append($("<option></option>").val("grayValue").text("gray"));
                    propertyColor.append($("<option></option>").val("silverValue").text("silver"));
                    properyOperator.val(device.operator ?? "<=");
                    propertyValue.typedInput('value',device.value ?? "");
                    propertyColor.val(device.color ?? "");
                },
                sortable: true,
                removable: true
            });
            const help = JSON.parse( this.colors ?? "[]" );
            for( const v of help ) {
                colorsList.editableList('addItem',v);
            }
        },
        oneditresize: function(size) {
            const rows = $("#dialog-form>div:not(.node-input-colors-container-row)");
            let height = size.height;
            for(let i=0; i<rows.length; i++) {
                height -= $(rows[i]).outerHeight(true);
            }
            const editorRow = $("#dialog-form>div.node-input-colors-container-row");
            height -= (parseInt(editorRow.css("marginTop"))+parseInt(editorRow.css("marginBottom")));
            $("#node-input-colors-container").editableList('height',height);
        },
        oneditsave: function() {
            const colors = $("#node-input-colors-container").editableList('items');
            let help = [];
            colors.each(function(i) {
                const item = $(this);
                const operator = item.find(".node-input-color-operator").val();
                const value    = item.find(".node-input-color-value").typedInput('value');
                const color    = item.find(".node-input-color-color").val();
                help.push( { operator:operator, value:value, color:color } );
            });
            //console.log(JSON.stringify( help ))
            this.colors = JSON.stringify( help );
        }
    });
</script>

<script type="text/html" data-template-name="formatNumber">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-input"><i class="fa fa-ellipsis-h"></i> Eigenschaft</label>
        <input type="text" id="node-input-property">
        <input type="hidden" id="node-input-propertyType">
    </div>
    <div class="form-row">
        <label for="node-input-unit"><i class="fa fa-plus"></i> Einheit</label>
        <input type="text" id="node-input-unit">
    </div>
    <div class="form-row">
        <label for="node-input-grouping"><i class="fa fa-angle-left"></i> Tausender</label>
        <input type="text" id="node-input-grouping">
    </div>
    <div class="form-row" id="decimal-details">
        <label for="node-input-decimal"><i class="fa fa-angle-down"></i> Dezimal</label>
        <input type="text" id="node-input-decimal">
    </div>
    <div class="form-row">
        <label for="node-input-digits"><i class="fa fa-angle-right"></i> Stellen</label>
        <input type="number" id="node-input-digits">
    </div>
    <div class="form-row">
        <label for="node-input-showStatus"><i class="fa fa-star-o"></i> Status</label>
        <input type="checkbox" id="node-input-showState" style="display:inline-block; width:20px; vertical-align:baseline;">
    </div>
    <div class="form-row">
        <label for="node-input-filter"><i class="fa fa-filter"></i> Filter</label>
        <input type="checkbox" id="node-input-filter" style="display:inline-block; width:20px; vertical-align:baseline;">
    </div>
    <div class="form-row node-input-colors-container-row">
        <label for="node-input-colors"><i class="fa fa-chevron-right "></i> Colors</label>
        <ol id="node-input-colors-container"></ol>
    </div>
</script>

<script type="text/html" data-help-name="formatNumber">
    <p>Formats the payload as a number.</p>
    <p>If the msg property <code>invalid</code> is present in the message, all nodes ignore the message.</p>

    <h3>Input</h3>
    
    <p>The message property to be used as payload can be defined with the <code>Property</code> property.</p>
    <p>This value is then</p>
    <ul>
        <li>if the value is a number: formated to a string according to the parameters and a unit is added</li>
        <li>if the value is <code>null</code> or does not exist, <code>null</code> is sent</li>
        <li>if a JSONata expression cannot be evaluated, <code>null</code> is sent</li>
        <li>in other cases: been sent out unmodified</li>
    </ul>
    
    <dl class="message-properties">
        <dt>payload <span class="property-type"></span></dt>
        <dd> input value.</dd>
    </dl>
    
    <h3>Output</h3>
    
    <dl class="message-properties">
        <dt>payload <span class="property-type">string</span></dt>
        <dd> formated value of payload.</dd>
    </dl>
    
    <h3>Parameter</h3>

    <dl class="message-properties">
        <dt>Property <span class="property-type">string</span></dt>
        <dd> defines the message property to be used as payload.</dd>
        <dt>Einheit <span class="property-type">string</span></dt>
        <dd> unit of the value.</dd>
        <dt>Tausender <span class="property-type">string</span></dt>
        <dd> character to group the number in segments of 3 digits.</dd>
        <dt>Dezimal <span class="property-type">string</span></dt>
        <dd> character to decimal separation.</dd>
        <dt>Stellen <span class="property-type">number</span></dt>
        <dd> number of digits after the decimal point.</dd>
        <dt>Status <span class="property-type">boolean</span></dt>
        <dd> shows the actual value as a node status.</dd>
        <dt>Filter <span class="property-type">boolean</span></dt>
        <dd> block sending of unchanged <code>payload</code>.</dd>
    </dl>
</script>
