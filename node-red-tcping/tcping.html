<script type="text/javascript">
    RED.nodes.registerType('tcPing',{
        category: 'network',
        color: '#fdf0c2',
        defaults: {
            name: {value:""},
            host: {value:""},
            port: {value:"",validate:RED.validators.number()}
        },
        inputs:1,
        outputs:1,
        icon: "alert.png",
        label: function() {
            return this.name||"tcPing";
        },
        labelStyle: function() {
            return this.name?"node_label_italic":"";
        },
        paletteLabel: "tcPing",
        inputLabels: 'request',
        outputLabels: 'data'
    });
</script>

<script type="text/x-red" data-template-name="tcPing">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-host"><i class="fa fa-dot-circle-o"></i> Host</label>
        <input type="text" id="node-input-host" placeholder="192.168.1.1">
    </div>
    <div class="form-row">
        <label for="node-input-port"><i class="fa fa-envelope-o"></i> Topic</label>
        <input type="text" id="node-input-port" placeholder="80">
    </div>
</script>
