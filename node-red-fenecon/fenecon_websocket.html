<script type="text/javascript">
    RED.nodes.registerType('feneconWebsocket',{
        category: 'input',
        color: '#0fcdf8',
        defaults: {
            name:  {value:""},
            fems:  {value:"",type:"feneconFems",required:true},
            edge:  {value:"0",required:true},
            inlist:{value:"[]",required:true},
            risk:  {value:false},
            timeout:{value:false}
        },
        inputs:1,
        outputs:3,
        icon: "solar.png",
        label: function() {
            return this.name||"Fenecon websocket";
        },
        labelStyle: function() {
            return this.name?"node_label_italic":"";
        },
        paletteLabel: "Fenecon WS",
        inputLabels: 'command / request',
        outputLabels: ['subscribed data','config data','state'],
        oneditprepare: function() {
            const node = this;
            const inlistList = $("#node-input-inlist-container").css('min-height','150px').css('min-width','450px').editableList({
                addItem: function(container,i,item) {
                    container.css({
                        overflow: 'hidden',
                        whiteSpace: 'nowrap'
                    });
                    const row = $('<div/>').appendTo(container);
                    const propertyName = $('<input/>',{class:"node-input-inlist-name",type:"text"})
                        .css("width","100%")
                        .appendTo(row)
                        .typedInput({types:['str']});
                    propertyName.typedInput('value',item.name ?? "");
                },
                removable: true
            });
            console.log(this.inlist)
            const help = JSON.parse( this.inlist ?? "[]" );
            for( const v of help ) {
                inlistList.editableList('addItem',{name:v});
            }
        },
        oneditresize: function(size) {
            const rows = $("#dialog-form>div:not(.node-input-inlist-container-row)");
            let height = size.height;
            for(let i=0; i<rows.length; i++) {
                height -= $(rows[i]).outerHeight(true);
            }
            const editorRow = $("#dialog-form>div.node-input-inlist-container-row");
            height -= (parseInt(editorRow.css("marginTop"))+parseInt(editorRow.css("marginBottom")));
            $("#node-input-inlist-container").editableList('height',height);
        },
        oneditsave: function() {
            const inlist = $("#node-input-inlist-container").editableList('items');
            let help = [];
            inlist.each(function(i) {
                const topic = $(this);
                const name  = topic.find(".node-input-inlist-name").typedInput('value');
                help.push( name );
            });
            console.log(JSON.stringify( help ))
            this.topics = JSON.stringify( help );
        }
    });
</script>

<script type="text/x-red" data-template-name="feneconWebsocket">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-fems"><i class="fa fa-server"></i> FEMS</label>
        <input type="text" id="node-input-fems">
    </div>
    <div class="form-row">
        <label for="node-input-edge"><i class="fa fa-list"></i> Edge</label>
        <input type="text" id="node-input-edge"></input>
    </div>
    <div class="form-row">
        <label for="node-input-risk"><i class="fa fa-bolt"></i> Risk accepted</label>
        <input type="checkbox" id="node-input-risk" style="display:inline-block; width:20px; vertical-align:baseline;">
    </div>
    <div class="form-row">
        <label for="node-input-timeout"><i class="fa fa-hourglass-start"></i> Timeout</label>
        <input type="checkbox" id="node-input-timeout" style="display:inline-block; width:20px; vertical-align:baseline;">
    </div>
    <div class="form-row node-input-inlist-container-row">
        <label for="node-input-inlist"><i class="fa fa-arrow-right"></i> Inlist</label>
        <ol id="node-input-inlist-container"></ol>
    </div>
</script>

<script type="text/x-red" data-help-name="feneconWebsocket">

    <p>A Node Red node to subscribe data points and configuration data at a Fenecon FEMS via the WebSocket interface similar to the web UI.</p>
    
    <p>It is also possible to write config data.<br>
    <strong>This can be dangerous and damage your FEMS! This is done at your own risk! Please be careful and we accept no responsibility whatsoever for a damaged FEMS!</strong></p>
    
    <h3>Input</h3>
    <dl class="message-properties">
        <dt>topic <span class="property-type">string</span></dt>
        <dd> <code>open</code>, <code>close</code> or name of the config parameter to be written</dd>
        <dt>payload <span class="property-type">number / string</span></dt>
        <dd> value of the config parameter to be written</dd>
    </dl>
    
    <h3>Outputs</h3>
    
    <h4>subscribed data</h4>
    <p>Cyclic output of the subscribed data points.</p>
    
    <dl class="message-properties">
        <dt>payload <span class="property-type">object</span></dt>
        <dd> received data points. It is an object with key/value pairs.</dd>
    </dl>
    
    <h4>config data</h4>
    <p>Config data of the FEMS.</p>
    
    <dl class="message-properties">
        <dt>payload <span class="property-type">object</span></dt>
        <dd> received config data.</dd>
    </dl>

    <h4>state</h4>
    <p>Actual state of the websocket connection.</p>

    <dl class="message-properties">
        <dt>payload <span class="property-type">object</span></dt>
        <dd> state of the websocket.</dd>
    </dl>
    
    <h3>Parameters</h3>
    <dl class="message-properties">
        <dt>fems <span class="property-type">feneconFems</span></dt>
        <dd> configuration of the FEMS.</dd>
        <dt>Edge <span class="property-type">string</span></dt>
        <dd> id of the edge; normally <code>"0"</code>.</dd>
        <dt>Inlist <span class="property-type">array</span></dt>
        <dd> list of subscribed data points.</dd>
        <dt>Risk <span class="property-type">boolean</span></dt>
        <dd> risk accepted, enables writing.</dd>
        <dt>Timeout <span class="property-type">boolean</span></dt>
        <dd> send <code>"timeout"</code> as state, if 10s no subscribed message arrives.</dd>
    </dl>
    
    <h4>Data Points</h4>
    
    <p>The data points of the FEMS are always named as <code>group/name</code>.
    You can find possible data points at <a href="https://docs.fenecon.de/de/fems/glossar.html#_liste_der_komponenten_und_kan%C3%A4le">FEMS documentation</a>.</p>

    <p>Example inlist:</p>
<code>[<br>
    "_sum/State",<br>
    "_sum/GridMode",<br>
    "_sum/EssSoc",<br>
    "_sum/ProductionActivePower",<br>
    "_sum/EssDischargePower",<br>
    "_sum/GridActivePower",<br>
    "_sum/GridSellActiveEnergy",<br>
    "_sum/GridBuyActiveEnergy",<br>
    "_sum/ProductionActiveEnergy",<br>
    "_sum/EssDcDischargeEnergy",<br>
    "_sum/EssDcChargeEnergy",<br>
    "batteryInverter0/AirTemperature",<br>
    "batteryInverter0/RadiatorTemperature",<br>
    "ctrlIoHeatPump0/Status",<br>
    "charger0/ActualPower",<br>
    "charger1/ActualPower",<br>
    "ctrlGridOptimizedCharge0/DelayChargeState",<br>
    "meter0/CurrentL1",<br>
    "meter0/CurrentL2",<br>
    "meter0/CurrentL3"<br>
]</code>
 
</script>
