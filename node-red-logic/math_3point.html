<script type="text/javascript">
    RED.nodes.registerType('threePoint',{
        category: 'logic',
        color: "#C0DEED",
        defaults: {
            name:{value:""},
            topic:{value:""},
            property:{value:"payload",required:true},
            propertyType:{value:"msg"},
            thresholdUpRise:{value:"",required:true,validate:RED.validators.number()},
            thresholdUpFall:{value:"",required:true,validate:function(v){
                const rise = $("#node-input-threshold_up_rise").length ? $("#node-input-threshold_up_rise").val() : this.thresholdUpRise;
                return v!=='' && !isNaN(v) && Number(v)<rise;}
            },
            thresholdLowRise:{value:"",required:true,validate:function(v){
                const fall = $("#node-input-threshold_up_fall").length ? $("#node-input-threshold_up_fall").val() : this.thresholdUpFall;
                return v!=='' && !isNaN(v) && Number(v)<fall;}
            },
            thresholdLowFall:{value:"",required:true,validate:function(v){
                const rise = $("#node-input-threshold_low_rise").length ? $("#node-input-threshold_low_rise").val() : this.thresholdLowRise;
                return v!=='' && !isNaN(v) && Number(v)<rise;}
            },
            outputUpper:{value:"+1",required:true},
            outputUpperType:{value:"num"},
            outputMiddle:{value:"0",required:true},
            outputMiddleType:{value:"num"},
            outputLower:{value:"-1",required:true},
            outputLowerType:{value:"num"},
            noInit:{value:false},
            showState:{value:false}
        },
        inputs:1,
        outputs:1,
        icon: "3point.png",
        label: function() {
            return this.name||this.topic||"3 point";
        },
        labelStyle: function() {
            return this.name?"node_label_italic":"";
        },
        paletteLabel: "3 point",
        inputLabels: 'input',
        outputLabels: 'three point controller trigger',
        oneditprepare: function() {
            $("#node-input-property").typedInput({
                type:"msg",
                types:["msg","jsonata"],
                typeField: "#node-input-propertyType"
            })
            $("#node-input-outputUpper").typedInput({
                type:"bool",
                types:["str","num","bool","json"],
                typeField: "#node-input-outputUpperType"
            })
            $("#node-input-outputMiddle").typedInput({
                type:"bool",
                types:["str","num","bool","json"],
                typeField: "#node-input-outputMiddleType"
            })
            $("#node-input-outputLower").typedInput({
                type:"bool",
                types:["str","num","bool","json"],
                typeField: "#node-input-outputLowerType"
            })
        }
    });
</script>

<script type="text/html" data-template-name="threePoint">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-topic"><i class="fa fa-envelope-o"></i> Topic</label>
        <input type="text" id="node-input-topic" placeholder="Topic">
    </div>
    <div class="form-row">
        <label for="node-input-input"><i class="fa fa-ellipsis-h"></i> Eigenschaft</label>
        <input type="text" id="node-input-property">
        <input type="hidden" id="node-input-propertyType">
    </div>
    <div class="form-row">
        <label for="node-input-threshold_up_rise"><i class="fa fa-chevron-up"></i> up up threshold</label>
        <input type="text" id="node-input-threshold_up_rise">
    </div>
    <div class="form-row">
        <label for="node-input-threshold_up_fall"><i class="fa fa-chevron-down"></i> up dn threshold</label>
        <input type="text" id="node-input-threshold_up_fall">
    </div>
    <div class="form-row">
        <label for="node-input-threshold_low_rise"><i class="fa fa-chevron-up"></i> dn up threshold</label>
        <input type="text" id="node-input-threshold_low_rise">
    </div>
    <div class="form-row">
        <label for="node-input-threshold_low_fall"><i class="fa fa-chevron-down"></i> dn dn threshold</label>
        <input type="text" id="node-input-threshold_low_fall">
    </div>
    <div class="form-row">
        <label for="node-input-outputUpper"><i class="fa fa-sign-out"></i> upper Output</label>
        <input type="text" id="node-input-outputUpper">
        <input type="hidden" id="node-input-outputUpperType">
    </div>
    <div class="form-row">
        <label for="node-input-outputMiddle"><i class="fa fa-sign-out"></i> middle Output</label>
        <input type="text" id="node-input-outputMiddle">
        <input type="hidden" id="node-input-outputMiddleType">
    </div>
    <div class="form-row">
        <label for="node-input-outputLower"><i class="fa fa-sign-out"></i> lower Output</label>
        <input type="text" id="node-input-outputLower">
        <input type="hidden" id="node-input-outputLowerType">
    </div>
    <div class="form-row">
        <label for="node-input-noInit"><i class="fa fa-play"></i> no inits</label>
        <input type="checkbox" id="node-input-noInit" style="display:inline-block; width:20px; vertical-align:baseline;">
    </div>
    <div class="form-row">
        <label for="node-input-showStatus"><i class="fa fa-star-o"></i> Status</label>
        <input type="checkbox" id="node-input-showState" style="display:inline-block; width:20px; vertical-align:baseline;">
    </div>
</script>

<script type="text/html" data-help-name="threePoint">
    
    <p>Message is only forwarded, if the payload rises above an upper limit or falls below a lower limit.</p>
    <p>Each <code>topic</code> is treated seperatly.</p>
    <p>If the msg property <code>invalid</code> is present in the message, all nodes ignore the message.</p>

    <h3>Input</h3>
    
    <p>The message property to be used as payload can be defined with the <code>Property</code> property.</p>

    <p>With a input message with <code>msg.topic=="query"</code> or <code>msg.query=true</code>, you can query the latest states of all topics.</p>
    
    <dl class="message-properties">
        <dt>topic <span class="property-type">string</span></dt>
        <dd> name of the input channel.</dd>
        <dt>payload <span class="property-type"></span></dt>
        <dd> input value for <code>topic</code>.</dd>
    </dl>
    
    <h3>Output</h3>

    <p>Trigger message, in case an edge is detected.</p>    

    <dl class="message-properties">
        <dt>topic <span class="property-type">string</span></dt>
        <dd> name of the input channel.</dd>
        <dt>payload <span class="property-type"></span></dt>
        <dd> output value defines in <code>rise Output</code> or <code>fall Output</code>.</dd>
        <dt>value <span class="property-type">number</span></dt>
        <dd> last input value for <code>topic</code>.</dd>
        <dt>edge <span class="property-type">string</span></dt>
        <dd> <code>"rising"</code> or <code>"falling"</code> according to detected edge.</dd>
        <dt>init <span class="property-type">boolean</span></dt>
        <dd> <code>true</code> in case of an initialization message without really an edge detection.</dd>
    </dl>
    
    <h3>Parameter</h3>

    <dl class="message-properties">
        <dt>Topic <span class="property-type">string</span></dt>
        <dd> defines the topic for the output message, "" is <code>msg.topic</code>.</dd>
        <dt>Property <span class="property-type">string</span></dt>
        <dd> defines the message property to be used as payload.</dd>
        <dt>up Threshold <span class="property-type">number</span></dt>
        <dd> threshold value for the rising edge detection.</dd>
        <dt>d(ow)n Threshold <span class="property-type">number</span></dt>
        <dd> threshold value for the falling edge detection.</dd>
        <dt>rise Consecutive <span class="property-type">number</span></dt>
        <dd> number of consecutive frames to generate a rising output.</dd>
        <dt>fall Consecutive <span class="property-type">number</span></dt>
        <dd> number of consecutive frames to generate a falling output.</dd>
        <dt>rise Output <span class="property-type">multi</span></dt>
        <dd> Value to be sent in case of a rising edge.</dd>
        <dt>fall Output <span class="property-type">multi</span></dt>
        <dd> Value to be sent in case of a falling edge.</dd>
        <dt>no init <span class="property-type">boolean</span></dt>
        <dd> does not send init messages.</dd>
        <dt>Status <span class="property-type">boolean</span></dt>
        <dd> shows the actual value as a node status.</dd>
    </dl>
    
</script>
