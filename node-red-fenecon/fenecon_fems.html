<script type="text/javascript">
    RED.nodes.registerType('feneconFems',{
        category: 'config',
        defaults: {
            name: {value:""},
            hostname: {value:"", required:true}
        },
        label: function() {
            return this.name || "fenecon-fems";
        },
        labelStyle: function() {
            return this.name?"node_label_italic":"";
        }
    });
</script>

<script type="text/html" data-template-name="feneconFems">
    <div class="form-row">
        <label for="node-config-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-config-input-name">
    </div>
    <div class="form-row">
        <label for="node-config-input-hostname"><i class="fa fa-server"></i> Hostname</label>
        <input type="text" id="node-config-input-hostname">
    </div>
</script>

    },
    "123456ab": {
        "nsw": "0123456789abcdef0123456789abcdef",
        "asw": "0123456789abcdef0123456789abcdef",
        "type": "FooType",

        "timeout": 3600

}</pre></dd>
