<script type="text/javascript">
    RED.nodes.registerType('debounceBool',{
        category: 'function',
        color: '#E6E0F8',
        defaults: {
            name:{value:""},
            property:{value:"payload",required:true},
            propertyType:{value:"msg"},
            timeTrue:{value:5,required:true,validate:RED.validators.regex(/^[1-9]\d*$/)},
            timeTrueUnit:{value:"secs"},
            timeFalse:{value:5,required:true,validate:RED.validators.regex(/^[1-9]\d*$/)},
            timeFalseUnit:{value:"secs"},
            restart:{value:false},
            bytopic:{value:false},
            showState:{value:false}
        },
        inputs:1,
        outputs:1,
        icon: function() {
            return "font-awesome/fa-flag-o";
        },
        label: function() {
            return this.name || "debounce B";
        },
        labelStyle: function() {
            return this.name?"node_label_italic":"";
        },
        paletteLabel: "debounce B",
        inputLabels: 'input',
        outputLabels: 'debounced payload',
        oneditprepare: function() {
            $("#node-input-property").typedInput({
                type:"msg",
                types:["msg","jsonata"],
                typeField: "#node-input-propertyType"
            });
        }
    });
</script>

<script type="text/x-red" data-help-name="debounceBool">

    <p>A Node Red node for debouncing boolean values.</p>
    
    <p>The <code>debounceBool</code> node is for debouncing of boolean values:</p>
    <ul>
    <li>What data is debounced can be selected with the <code>property</code> property.</li>
    <li>Unchanged values are sent out immediately.</li>
    <li>Debouncing means here that the node waits <code>timeTrue</code> / <code>timeFalse</code> time 
        before sending out the last received message.</li>
    <li>If <code>restart</code> is active, the debouncing time is started again with every changed message.</li>
    </uL>
    
    <h3>Input</h3>
    <dl class="message-properties">
        <dt>topic <span class="property-type">string</span></dt>
        <dd> name of the input channel.</dd>
        <dt>payload <span class="property-type"></span></dt>
        <dd> input value for topic.</dd>
        <dt>debounceMs <span class="property-type">number</span></dt>
        <dd> if set, this is the debounce time for this message.</dd>
        <dt>invalid <span class="property-type">boolean</span></dt>
        <dd> if true, this message is ignored.</dd>
        <dt>reset <span class="property-type">boolean</span></dt>
        <dd> if true, resets the node; if combined with a <code>topic</code>, only this topic is reseted</dd>
    </dl>
    
    <h3>Outputs</h3>
    <dl class="message-properties">
        <dt>topic <span class="property-type">string</span></dt>
        <dd> same is in corresponding input message.</dd>
        <dt>payload <span class="property-type"></span></dt>
        <dd> data evaluated out of the input message.</dd>
    </dl>
    
    <h3>Parameters</h3>
    <dl class="message-properties">
        <dt>Property <span class="property-type">string</span></dt>
        <dd> defines the message property to be used as payload.</dd>
        <dt>Time True<span class="property-type">number</span></dt>
        <dd> debouncing time for <code>true</code> value.</dd>
        <dt>Time False<span class="property-type">number</span></dt>
        <dd> debouncing time for <code>false</code> value.</dd>
        <dt>Restart <span class="property-type">boolean</span></dt>
        <dd> shall the debouncing time be restarted with every received message.</dd>
        <dt>byTopic <span class="property-type">boolean</span></dt>
        <dd> shall resending be done on a topic base.</dd>
        <dt>Status <span class="property-type">boolean</span></dt>
        <dd> shows the actual value as a node status.</dd>
    </dl>
    
</script>
