<script type="text/javascript">
    RED.nodes.registerType('feneconConnMan',{
        category: 'input',
        color: '#0fcdf8',
        defaults: {
            name:  {value:""},
            cyclic:{value:15,required:true,validate:RED.validators.number()}
        },
        inputs:1,
        outputs:1,
        icon: "solar.png",
        label: function() {
            return this.name||"Connection Manager";
        },
        labelStyle: function() {
            return this.name?"node_label_italic":"";
        },
        paletteLabel: "Fenecon CM",
        inputLabels: 'WS state',
        outputLabels: 'WS command'
    });
</script>

<script type="text/x-red" data-template-name="feneconConnMan">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-cyclic"><i class="fa fa-refresh"></i> Cyclic</label>
        <input type="number" id="node-input-cyclic">
    </div>
</script>

<script type="text/x-red" data-help-name="feneconConnMan">
    <p>A Node Red node to manage the state of a <code>feneconWebsocket</code> node.</p>
    
    <h3>Input</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">string</span></dt>
        <dd> state message from <code>feneconWebsocket</code> node.</dd>
    </dl>
    
    <h3>Output</h3>
    <dl class="message-properties">
        <dt>topic <span class="property-type">string</span></dt>
        <dd> <code>open</code> command for a <code>feneconWebsocket</code> node.</dd>
    </dl>
    
    <h3>Parameters</h3>
    <dl class="message-properties">
        <dt>cyclic <span class="property-type">number</span></dt>
        <dd> cyclic time of the manager in s; 15s is here the recommended value.</dd>
    </dl>
</script>
