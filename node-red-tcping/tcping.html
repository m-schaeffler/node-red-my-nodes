<script type="text/javascript">
    RED.nodes.registerType('tcPing',{
        category: 'network',
        color: '#fdf0c2',
        defaults: {
            name: {value:""},
            host: {value:""},
            port: {value:"",validate:RED.validators.regex(/^(|[1-9]\d*)$/)},
            family: {value:"0"}
        },
        inputs:1,
        outputs:1,
        icon: "alert.png",
        label: function() {
            return this.name||"tcPing";
        },
        labelStyle: function() {
            return this.name?"node_label_italic":"";
        },
        paletteLabel: "tcPing",
        inputLabels: 'request',
        outputLabels: 'data'
    });
</script>

<script type="text/x-red" data-template-name="tcPing">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-host"><i class="fa fa-dot-circle-o"></i> Host</label>
        <input type="text" id="node-input-host" placeholder="192.168.1.1">
    </div>
    <div class="form-row">
        <label for="node-input-port"><i class="fa fa-plug"></i> Port</label>
        <input type="text" id="node-input-port" placeholder="80">
    </div>
    <div class="form-row">
        <label for="node-input-family"><i class="fa fa-cog"></i> Family</label>
        <select type="text" id="node-input-family">
            <option value="0">Automatic</option>
            <option value="4">IPv4</option>
            <option value="6">IPv6</option>
        </select>
    </div>
</script>

<script type="text/x-red" data-help-name="tcPing">

    <p>A Node Red node to ping a host via TCP.</p>

    <p>The node tests the ability to communicate with a host at a specific TCP port. 
    It just tries to establish the communication and closes it again without sending or receiving anything.</p>
    
    <h3>Input</h3>
    <dl class="message-properties">
        <dt>topic <span class="property-type">string</span></dt>
        <dd> topic.</dd>
        <dt>payload <span class="property-type">undefined</span></dt>
        <dd> Host and Port must be set in the node parameters.</dt>
        <dt>payload <span class="property-type">string</span></dt>
        <dd> defines the Host. If no Port is set with a speration by <code>:</code>, the Port parameter is used.</dt>
        <dt>payload <span class="property-type">object</span></dt>
        <dd> Host, Port and Family can be set by corresponding attributes; all missing ones are taken from the parameters.</dt>
    </dl>

    <h3>Output</h3>
    <dl class="message-properties">
        <dt>topic <span class="property-type">string</span></dt>
        <dd> same as in input</dd>
        <dt>payload <span class="property-type">number or <code>false</code></span></dt>
        <dd> time of the communication startup or <code>false</code>; so it can be used like a Boolean value.</dd>
        <dt>ping <span class="property-type">object</span></dt>
        <dd> detailed data of the ping.</dd>
    </dl>
    
    <h3>Parameters</h3>
    <dl class="message-properties">
        <dt>Host <span class="property-type">string</span></dt>
        <dd> Host to be pinged.</dd>
        <dt>Port <span class="property-type">number</span></dt>
        <dd> TCP port to be used.</dd>
        <dt>Family <span class="property-type">number</span></dt>
        <dd> Automatic, IPv4 or IPv6.</dd>
    </dl>
    
</script>
