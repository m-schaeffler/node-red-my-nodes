<script type="text/javascript">
    RED.nodes.registerType('msg-sequence',{
        category: "function",
        color: "#E6E0F8",
        defaults: {
            interval: {value:5,required:true,validate:function(v){
                return v!=='' && !isNaN(v) && Number(v)>0;
            }},
            intervalUnit: {value:"secs"},
            outputs: {value:1,required:true,validate:function(v){
                return v!=='' && !isNaN(v) && Number(v)>0;
            }},
            bytopic: {value:false},
            clone: {value:false},
            name: {value:""},
            contextStore:{value:"",required:true},
            showState:{value:false}
        },
        inputs:1,
        outputs:1,
        icon: "font-awesome/fa-list-ol",
        label: function() {
            return this.name||`sequence ${this.interval}${this.intervalUnit}`;
        },
        labelStyle: function() {
            return this.name?"node_label_italic":"";
        },
        paletteLabel: "sequence",
        inputLabels: "trigger",
        outputLabels: function(index) {
            return `${index+1}. message`;
        },
        oneditprepare: function() {
            const node = this;
            // populate store names
            $("#node-input-contextStore").empty();
            $("#node-input-contextStore").append(`<option value="none">None</option>`);
            const defaultStore = RED.settings.hasOwnProperty("context") ? RED.settings.context.default : '';
            RED.settings.context.stores.forEach(function(item){
                if( item ) {
                   const opt = $(`<option value="${item}">${item}${item===defaultStore?" (default)":""}</option>`);
                   $("#node-input-contextStore").append(opt);
                }
            });
            const currentStore = node.contextStore || '';
            // select the current option
            $("#node-input-contextStore").val(currentStore);
        }
    });
</script>

<script type="text/x-red" data-template-name="msg-sequence">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-interval"><i class="fa fa-tasks"></i> Interval</label>
        <input type="number" id="node-input-interval" style="width:70px;" placeholder="Interval">
        <select id="node-input-intervalUnit" style="width:140px;">
            <option value="msecs">MilliSeconds</option>
            <option value="secs">Seconds</option>
            <option value="mins">Minutes</option>
            <option value="hours">Hours</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-outputs"><i class="fa fa-hashtag"></i> Outputs</label>
        <input type="number" id="node-input-outputs" placeholder="Outputs">
    </div>
    <div class="form-row">
        <label for="node-input-contextStore"><i class="fa fa-database"></i> Contextstore</label>
        <select type="text" id="node-input-contextStore"></select>
    </div>
    <div class="form-row">
        <label><i class="fa fa-envelope"></i></label>
        <input type="checkbox" id="node-input-bytopic" style="display: inline-block; width: 20px; vertical-align: baseline;">
        <label for="node-input-bytopic" style="width:70%;">Topic dependent</label>
    </div>
    <div class="form-row">
        <label><i class="fa fa-clone"></i></label>
        <input type="checkbox" id="node-input-clone" style="display: inline-block; width: 20px; vertical-align: baseline;">
        <label for="node-input-clone" style="width:70%;">Force cloning</label>
    </div>
    <div class="form-row">
        <label><i class="fa fa-star-o"></i></label>
        <input type="checkbox" id="node-input-showState" style="display:inline-block; width:20px; vertical-align:baseline;">
        <label for="node-input-showState" style="width:70%;">Status</label>
    </div>
</script>

<script type="text/x-red" data-help-name="msg-sequence">

    <p>A Node Red node for sequencing flow messages into several outputs.</p>
    
    <p>Any incoming message is immeditely routed to the 1st output and then after a delay of <code>intervall</code> to the 2nd and so on.</p>
    
    <h3>Input</h3>
    <dl class="message-properties">
        <dt>topic <span class="property-type">string</span></dt>
        <dd> topic for the output message</dd>
        <dt>payload <span class="property-type"></span></dt>
        <dd> payload for the output message</dd>
        <dt>reset <span class="property-type">boolean</span></dt>
        <dd> if true, resets the node; if combined with a <code>topic</code>, only this topic is reseted</dd>
        <dt>resend_interval <span class="property-type">number</span></dt>
        <dd> changes the parameter <code>interval</code> for this topic; value is in msec</dd>
    </dl>
    
    <h3>Outputs</h3>
    <dl class="message-properties">
        <dt>topic <span class="property-type">string</span></dt>
        <dd> same is in corresponding input message</dd>
        <dt>payload <span class="property-type"></span></dt>
        <dd> same is in corresponding input message</dd>
        <dt>&hellip; <span class="property-type"></span></dt>
        <dd> same is in corresponding input message</dd>
    </dl>
    
    <h3>Parameters</h3>
    <dl class="message-properties">
        <dt>interval <span class="property-type">number</span></dt>
        <dd> the intervall between two steps of the sequence</dd>
        <dt>outputs <span class="property-type">number</span></dt>
        <dd> the number of outputs of the node</dd>
        <dt>Contextstore <span class="property-type">context store</span></dt>
        <dd> context store for storing the values; <code>none</code> is no storage.</dd>
        <dt>byTopic <span class="property-type">boolean</span></dt>
        <dd> shall sequencing be done on a topic base</dd>
        <dt>clone <span class="property-type">boolean</span></dt>
        <dd> shall the messages be cloned</dd>
        <dt>Status <span class="property-type">boolean</span></dt>
        <dd> shows the actual value as a node status.</dd>
    </dl>
    
</script>
