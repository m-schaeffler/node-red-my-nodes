<script type="text/javascript">
    RED.nodes.registerType('formatBool',{
        category: "Dashboard 2",
        color: "#C7E9C0",
        defaults: {
            name:{value:""},
            property:{value:"payload",required:true},
            propertyType:{value:"msg"},
            topic:{value:""},
            falseValue:{value:"0",required:true},
            falseValueType:{value:"num"},
            trueValue:{value:"1",required:true},
            trueValueType:{value:"num"},
            timeout:{value:"0",validate:RED.validators.number(),required:true},
            timeoutUnit:{value:"secs"},
            timeoutValue:{value:""},
            timeoutValueType:{value:"last"},
            showState:{value:false},
            filter:{value:false}
        },
        inputs:1,
        outputs:1,
        icon: "font-awesome/fa-quote-left",
        label: function() {
            return this.name||"formBool";
        },
        labelStyle: function() {
            return this.name?"node_label_italic":"";
        },
        paletteLabel: "formBool",
        inputLabels: 'input',
        outputLabels: 'formated boolean',
        oneditprepare: function() {
            if( this.timeoutUnit === undefined )
            {
                $("#node-input-timeoutUnit").val( "secs" );
            }
            $("#node-input-property").typedInput({
                type:"msg",
                types:["msg","jsonata"],
                typeField: "#node-input-propertyType"
            })
            $("#node-input-falseValue").typedInput({
                type:"bool",
                types:["str","num","bool","json"],
                typeField: "#node-input-falseValueType"
            })
            $("#node-input-trueValue").typedInput({
                type:"bool",
                types:["str","num","bool","json"],
                typeField: "#node-input-trueValueType"
            })
            $("#node-input-timeoutValue").typedInput({
                type:"bool",
                types:[{value:'last',label:'last Value',hasValue:false},"str","num","bool","json"],
                typeField: "#node-input-timeoutValueType"
            })
            $("#node-input-timeout").on("change",function() {
                if (this.value === "0") {
                    $("#timeout-details").hide();
                } else {
                    $("#timeout-details").show();
                }
            }).trigger("change");
        }
    });
</script>

<script type="text/html" data-template-name="formatBool">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-topic"><i class="fa fa-envelope-o"></i> Topic</label>
        <input type="text" id="node-input-topic" placeholder="Topic">
    </div>
    <div class="form-row">
        <label for="node-input-input"><i class="fa fa-ellipsis-h"></i> Eigenschaft</label>
        <input type="text" id="node-input-property">
        <input type="hidden" id="node-input-propertyType">
    </div>
    <div class="form-row">
        <label for="node-input-falseValue"><i class="fa fa-square-o"></i> false Value</label>
        <input type="text" id="node-input-falseValue">
        <input type="hidden" id="node-input-falseValueType">
    </div>
    <div class="form-row">
        <label for="node-input-trueValue"><i class="fa fa-check-square-o"></i> true Value</label>
        <input type="text" id="node-input-trueValue">
        <input type="hidden" id="node-input-trueValueType">
    </div>
    <div class="form-row">
        <label for="node-input-timeout"><i class="fa fa-refresh"></i> Timeout</label>
        <input type="number" id="node-input-timeout" style="width:70px;" placeholder="Time">
        <select id="node-input-timeoutUnit" style="width:140px;">
            <option value="msecs">MilliSeconds</option>
            <option value="secs">Seconds</option>
            <option value="mins">Minutes</option>
            <option value="hours">Hours</option>
        </select>
    </div>
    <div class="form-row" id="timeout-details">
        <label for="node-input-timeoutValue"><i class="fa fa-share-square-o"></i> Timeout Value</label>
        <input type="text" id="node-input-timeoutValue">
        <input type="hidden" id="node-input-timeoutValueType">
    </div>
    <div class="form-row">
        <label for="node-input-showStatus"><i class="fa fa-star-o"></i> Status</label>
        <input type="checkbox" id="node-input-showState" style="display:inline-block; width:20px; vertical-align:baseline;">
    </div>
    <div class="form-row">
        <label for="node-input-filter"><i class="fa fa-filter"></i> Filter</label>
        <input type="checkbox" id="node-input-filter" style="display:inline-block; width:20px; vertical-align:baseline;">
    </div>
</script>

<script type="text/html" data-help-name="formatBool">
    <p>Formats a boolean payload e.G. for display in a graph.</p>
    <p>If the msg property <code>invalid</code> is present in the message, all nodes ignore the message.</p>

    <h3>Input</h3>
    
    <p>The message property to be used as payload can be defined with the <code>Property</code> property.</p>
    
    <dl class="message-properties">
        <dt>payload <span class="property-type"></span></dt>
        <dd> input value.</dd>
    </dl>
    
    <h3>Output</h3>
    
    <dl class="message-properties">
        <dt>payload <span class="property-type">number, string, JSON</span></dt>
        <dd> formated value of payload.</dd>
    </dl>
    
    <h3>Parameter</h3>

    <dl class="message-properties">
        <dt>Topic <span class="property-type">string</span></dt>
        <dd> defines the topic for the output message, <code>""</code> is <code>msg.topic</code>.</dd>
        <dt>Property <span class="property-type">string</span></dt>
        <dd> defines the message property to be used as payload.</dd>
        <dt>falseValue <span class="property-type">number, string, JSON</span></dt>
        <dd> output value for falsy values.</dd>
        <dt>trueValue <span class="property-type">number, string, JSON</span></dt>
        <dd> output value for truthy values.</dd>
        <dt>Timeout <span class="property-type">number</span></dt>
        <dd> Timeout duration; <code>0</code> is no timeout.</dd>
        <dt>Timeout Value <span class="property-type">last, number, string, JSON</span></dt>
        <dd> output value in case of a timeout, with "last Value" the last received value will be resent.</dd>
        <dt>Status <span class="property-type">boolean</span></dt>
        <dd> shows the actual value as a node status.</dd>
        <dt>Filter <span class="property-type">boolean</span></dt>
        <dd> block sending of unchanged <code>payload</code>.</dd>
    </dl>
</script>
